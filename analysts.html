<script>
  (() => {
    const toggle = document.querySelector('[data-theme-toggle]');
    const root = document.documentElement;
    let theme = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    root.setAttribute('data-theme', theme);
    const renderToggle = () => {
      toggle.innerHTML = theme === 'dark'
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      toggle.setAttribute('aria-label', theme === 'dark' ? '切換為亮色模式' : '切換為暗色模式');
    };
    renderToggle();
    toggle.addEventListener('click', () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', theme);
      renderToggle();
    });

    const data = window.ANALYSTS_DATA || [];
    const tabsWrap = document.getElementById('analyst-tabs');
    const panelsWrap = document.getElementById('analyst-panels');
    const escapeHtml = (str = '') => String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;').replace(/'/g, '&#39;');
    const renderAvatar = (item) => item.avatarSrc ? `<img src="${escapeHtml(item.avatarSrc)}" alt="${escapeHtml(item.avatarAlt || item.name)}" width="320" height="320" loading="lazy">` : `<div class="avatar-placeholder" aria-label="${escapeHtml(item.avatarAlt || item.name)} 頭像預留位置"><svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="32" cy="24" r="12"></circle><path d="M8 56c0-13.255 10.745-24 24-24s24 10.745 24 24"></path></svg><span>頭像上傳中</span></div>`;
    const renderTags = (item) => (item.tags || []).map(tag => `<span class="tag ${(item.goldTags || []).includes(tag) ? 'gold' : ''}">${escapeHtml(tag)}</span>`).join('');
    const renderStats = (item) => (item.stats || []).map(stat => `<div class="stat-chip"><div class="label">${escapeHtml(stat.label)}</div><div class="val">${escapeHtml(stat.val)}</div><div class="sub">${escapeHtml(stat.sub)}</div></div>`).join('');
    const renderTimeline = (item) => (item.timeline || []).map(row => `<div class="tl-item"><div class="tl-dot"></div><div class="tl-content"><h4>${escapeHtml(row.title)}</h4><p>${escapeHtml(row.desc)}</p>${row.badge ? `<span class="tl-badge">${escapeHtml(row.badge)}</span>` : ''}</div></div>`).join('');

    tabsWrap.innerHTML = data.map((item, idx) => `<button class="tab-btn ${idx === 0 ? 'active' : ''}" role="tab" aria-selected="${idx === 0 ? 'true' : 'false'}" aria-controls="panel-${escapeHtml(item.id)}" id="tab-${escapeHtml(item.id)}" data-target="${escapeHtml(item.id)}"><span class="tab-avatar" aria-hidden="true">${item.avatarSrc ? `<img src="${escapeHtml(item.avatarSrc)}" alt="${escapeHtml(item.name)}" loading="lazy">` : escapeHtml(item.emoji || '👤')}</span>${escapeHtml(item.name)}</button>`).join('');

    panelsWrap.innerHTML = data.map((item, idx) => `<div class="analyst-panel ${idx === 0 ? 'active' : ''}" id="panel-${escapeHtml(item.id)}" role="tabpanel" aria-labelledby="tab-${escapeHtml(item.id)}"><div class="analyst-layout"><div class="identity-card"><div class="avatar-wrap">${renderAvatar(item)}<span class="avatar-badge">${escapeHtml(item.roleBadge || '分析師')}</span></div><div class="identity-info"><h2 class="analyst-name">${escapeHtml(item.name)}</h2><p class="analyst-title">${escapeHtml(item.title)}</p><p class="analyst-desc">${escapeHtml(item.description)}</p><div class="tag-row">${renderTags(item)}</div></div></div><div class="analyst-details"><div class="detail-card"><h3 class="detail-card-title"><span class="icon">📊</span>核心數據</h3><div class="stat-chips">${renderStats(item)}</div></div><div class="detail-card"><h3 class="detail-card-title"><span class="icon">${escapeHtml(item.timelineIcon || '🏆')}</span>${escapeHtml(item.timelineTitle || '代表經歷')}</h3><div class="timeline">${renderTimeline(item)}</div></div></div></div></div>`).join('');

    const tabs = document.querySelectorAll('.tab-btn');
    let currentIdx = 0;
    tabs.forEach((tab, idx) => tab.addEventListener('click', () => {
      if (tab.classList.contains('active')) return;
      const nextPanel = document.getElementById('panel-' + tab.dataset.target);
      const currentPanel = document.querySelector('.analyst-panel.active');
      const goRight = idx > currentIdx;
      currentPanel.classList.remove('active');
      currentPanel.style.opacity = '0';
      currentPanel.style.pointerEvents = 'none';
      currentPanel.style.transform = goRight ? 'translateX(calc(var(--shift) * -1)) rotateY(calc(var(--tilt) * -1))' : 'translateX(var(--shift)) rotateY(var(--tilt))';
      currentPanel.style.position = 'absolute';
      nextPanel.style.opacity = '0';
      nextPanel.style.pointerEvents = 'auto';
      nextPanel.style.transform = goRight ? 'translateX(var(--shift)) rotateY(var(--tilt))' : 'translateX(calc(var(--shift) * -1)) rotateY(calc(var(--tilt) * -1))';
      nextPanel.style.position = 'relative';
      requestAnimationFrame(() => { nextPanel.classList.add('active'); nextPanel.style.opacity = '1'; nextPanel.style.transform = 'translateX(0) rotateY(0deg)'; });
      tabs.forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); });
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
      currentIdx = idx;
    }));
  })();
</script>
<script>
  (() => {
    const candidates = document.querySelectorAll('section,.stat-card,.service-card,.path-card,.value-card,.showcase-main,.showcase-item,.cta-band,.contact-card,.culture-card,.news-card,.article-card,.strategy-card,.faq-item,.detail-card');
    candidates.forEach((el, index) => {
      if (!el.hasAttribute('data-animate')) el.setAttribute('data-animate', 'fade-up');
      el.style.transitionDelay = `${Math.min(index * 35, 280)}ms`;
    });
    if (!('IntersectionObserver' in window)) {
      candidates.forEach(el => el.classList.add('is-visible'));
      return;
    }
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    candidates.forEach(el => observer.observe(el));
  })();
</script></body>
</html>
